services:
  bot:
    build: .
    container_name: paperclip-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "${METRICS_PORT:-9090}:9090"
    environment:
      - METRICS_ENABLED=true
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3
